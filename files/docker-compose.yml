version: "3.9"

services:
  sdcf-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sdcf-valuation-api:latest
    container_name: sdcf-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  # Optional: nginx reverse proxy (uncomment for production)
